watch_stylesheet: true
watch_config: true
debug: false
update_check: true

komorebi:
  start_command: "komorebic start --whkd"
  stop_command: "komorebic stop --whkd"
  reload_command: "komorebic stop --whkd && komorebic start --whkd"

bars:
  # Primary bar - ZOWIE XL LCD (monitor 0)
  primary-bar:
    enabled: true
    screens: ["ZOWIE XL LCD"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      align: "center"
    animation:
      enabled: true
      duration: 400
    blur_effect:
      enabled: false
      dark_mode: false
      round_corners: false
      border_color: None
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 34
    padding:
      top: 8
      left: 8
      bottom: 4
      right: 8
    widgets:
      left:
        - "home"
        - "komorebi_workspaces"
        - "komorebi_layout"
      center:
        - "clock"
      right:
        - "systray"
        - "media_player"
        - "open_meteo"
        - "cpu"
        - "memory"
        - "volume"
        - "network"
        - "notifications"
        - "power_menu"

  # Coms bar - X34 S ultrawide (monitor 1)
  coms-bar:
    enabled: true
    screens: ["X34 S"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      align: "center"
    animation:
      enabled: true
      duration: 400
    blur_effect:
      enabled: false
      dark_mode: false
      round_corners: false
      border_color: None
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 34
    padding:
      top: 8
      left: 8
      bottom: 4
      right: 8
    widgets:
      left:
        - "home"
        - "komorebi_layout"
      center:
        - "clock"
      right:
        - "systray"
        - "media_player"
        - "open_meteo"
        - "cpu"
        - "memory"
        - "volume"
        - "network"
        - "notifications"
        - "power_menu"

  # Misc bar - FI24D (monitor 2)
  misc-bar:
    enabled: true
    screens: ["FI24D"]
    class_name: "yasb-bar"
    alignment:
      position: "top"
      align: "center"
    animation:
      enabled: true
      duration: 400
    blur_effect:
      enabled: false
      dark_mode: false
      round_corners: false
      border_color: None
    window_flags:
      always_on_top: false
      windows_app_bar: true
    dimensions:
      width: "100%"
      height: 34
    padding:
      top: 8
      left: 8
      bottom: 4
      right: 8
    widgets:
      left:
        - "home"
        - "komorebi_layout"
      center:
        - "clock"
      right:
        - "systray"
        - "media_player"
        - "open_meteo"
        - "cpu"
        - "memory"
        - "volume"
        - "network"
        - "notifications"
        - "power_menu"

widgets:
  home:
    type: "yasb.home.HomeWidget"
    options:
      label: "<span>\uf40e</span>"
      menu_list:
        - { title: "User Home", path: "~" }
        - { title: "Downloads", path: "~\\Downloads" }
        - { title: "Documents", path: "~\\Documents" }
        - { title: "Pictures", path: "~\\Pictures" }
      system_menu: true
      power_menu: true
      blur: true
      round_corners: true
      round_corners_type: "normal"
      border_color: "System"
      alignment: "center"

  komorebi_workspaces:
    type: "komorebi.workspaces.WorkspaceWidget"
    options:
      label_offline: "Komorebi Offline"
      label_workspace_btn: "\udb85\udcfc"
      label_workspace_active_btn: "\udb85\udcfb"
      label_default_name: "{index}"
      label_zero_index: false
      hide_empty_workspaces: true
      hide_if_offline: true

  komorebi_layout:
    type: "komorebi.active_layout.ActiveLayoutWidget"
    options:
      hide_if_offline: true
      label: "{icon}"
      layouts:
        - "bsp"
        - "columns"
        - "vertical_stack"
        - "horizontal_stack"
        - "grid"
      layout_icons:
        bsp: "BSP"
        columns: "COLS"
        rows: "ROWS"
        grid: "GRID"
        vertical_stack: "V-STACK"
        horizontal_stack: "H-STACK"
        ultrawide_vertical_stack: "W-STACK"
        right_main_vertical_stack: "RMV-STACK"
        monocle: "MONOCLE"
        maximized: "MAX"
        floating: "FLOATING"
        paused: "PAUSED"
      callbacks:
        on_left: "next_layout"
        on_middle: "toggle_monocle"
        on_right: "prev_layout"

  clock:
    type: "yasb.clock.ClockWidget"
    options:
      label: "<span>\uf4ab</span> {%a, %d %b %I:%M:%S}"
      label_alt: "<span>\uf4ab</span> {%A, %d %B %Y %H:%M}"
      timezones: ["America/New_York"]
      calendar:
        blur: true
        round_corners: true
        alignment: "center"
        direction: "down"
        extended: false
        show_years: true
        show_holidays: false
        show_week_numbers: true
      callbacks:
        on_left: "toggle_calendar"
        on_middle: "toggle_label"
        on_right: "context_menu"

  systray:
    type: "yasb.systray.SystrayWidget"
    options:
      class_name: "systray"
      label_collapsed: "\udb85\udcfc"
      label_expanded: "\udb85\udcfb"
      label_position: "right"
      pin_click_modifier: "ctrl"
      show_unpinned: false
      show_battery: false
      show_volume: false
      icon_size: 16
      use_hook: true
      show_in_popup: true
      icons_per_row: 5
      popup:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: None
        alignment: "center"
        direction: "down"
        offset_top: 6
        offset_left: 0

  media_player:
    type: "yasb.media.MediaWidget"
    options:
      label: "<span>{icon}</span>"
      label_alt: "<span>{icon}</span>"
      separator: " - "
      max_field_size:
        label: 20
        label_alt: 24
      show_thumbnail: false
      controls_only: true
      controls_left: false
      controls_hide: false
      hide_empty: true
      thumbnail_alpha: 80
      thumbnail_padding: 8
      thumbnail_corner_radius: 4
      icons:
        prev_track: "\uf048"
        next_track: "\uf051"
        play: "\uf04b"
        pause: "\uf04c"
      callbacks:
        on_left: "toggle_label"
        on_middle: "do_nothing"
        on_right: "do_nothing"

  open_meteo:
    type: "yasb.open_meteo.OpenMeteoWidget"
    options:
      label: "<span>{icon}</span> {temp}"
      label_alt: "{location}: Min {min_temp}, Max {max_temp}, Humidity {humidity}"
      tooltip: true
      update_interval: 600
      hide_decimal: true
      units: "imperial"
      callbacks:
        on_left: "toggle_card"
        on_middle: "do_nothing"
        on_right: "toggle_label"
      icons:
        sunnyDay: "\ue706"
        clearNight: "\uec46"
      weather_card:
        blur: true
        alignment: "right"
        direction: "down"
        icon_size: 32
        show_hourly_forecast: true
        time_format: "24h"
        hourly_point_spacing: 76
        hourly_icon_size: 16
        icon_smoothing: true
        temp_line_width: 2
        current_line_color: "#9ccfd8"
        current_line_width: 1
        current_line_style: "dot"
        hourly_forecast_buttons:
          enabled: false
        weather_animation:
          enabled: true
          snow_overrides_rain: true
          temp_line_animation_style: both
          rain_effect_intensity: 1.0
          snow_effect_intensity: 1.0
          scale_with_chance: true

  cpu:
    type: "yasb.cpu.CpuWidget"
    options:
      label: "CPU {info[percent][total]}%"
      label_alt: "CPU {info[freq][current]} MHz"
      update_interval: 2000
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"

  memory:
    type: "yasb.memory.MemoryWidget"
    options:
      label: "RAM {virtual_mem_percent}%"
      label_alt: "RAM {virtual_mem_free} free"
      update_interval: 5000
      menu:
        enabled: true
        show_graph: true
        show_graph_grid: true
        graph_history_size: 60
      callbacks:
        on_left: "toggle_menu"
        on_middle: "do_nothing"
        on_right: "toggle_label"

  volume:
    type: "yasb.volume.VolumeWidget"
    options:
      label: "<span>{icon}</span> {level}"
      label_alt: "<span>{icon}</span> {level}%"
      icons:
        muted: "\ueee8"
        "10": "\uf026"
        "30": "\uf027"
        "60": "\uf027"
        "100": "\uf028"
      callbacks:
        on_left: "toggle_volume_menu"
        on_middle: "exec cmd.exe /c start ms-settings:sound"
        on_right: "toggle_mute"

  network:
    type: "yasb.wifi.WifiWidget"
    options:
      label: "<span>{wifi_icon}</span>"
      label_alt: "{wifi_name} {wifi_strength}%"
      update_interval: 5000
      ethernet_label: "<span>\ue839</span>"
      ethernet_label_alt: "<span>\ue839</span> {ip_addr}"
      ethernet_icon: "\ue839"
      get_exact_wifi_strength: false
      callbacks:
        on_left: "toggle_menu"
        on_middle: "exec cmd.exe /c start ms-settings:network"
        on_right: "toggle_label"

  notifications:
    type: "yasb.notifications.NotificationsWidget"
    options:
      label: "<span>\uf2a3</span>"
      label_alt: "{count} notifications"
      hide_empty: true
      tooltip: false
      callbacks:
        on_left: "toggle_notification"
        on_middle: "do_nothing"
        on_right: "do_nothing"

  power_menu:
    type: "yasb.power_menu.PowerMenuWidget"
    options:
      label: "\uf011"
      uptime: true
      show_user: true
      menu_style: "popup"
      popup:
        blur: true
        round_corners: true
        round_corners_type: "normal"
        border_color: "System"
        alignment: "right"
        direction: "down"
        offset_top: 6
        offset_left: 0
      profile_image_size: 64
      buttons:
        lock: ["\ue72e", "Lock"]
        signout: ["\udb80\udf43", "Sign out"]
        sleep: ["\uec46", "Sleep"]
        hibernate: ["\uf28e", "Hibernate"]
        restart: ["\uead2", "Restart"]
        shutdown: ["\uf011", "Shut Down"]
        cancel: ["\udb81\udf3a", "Cancel"]
